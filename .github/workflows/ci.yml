name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle webview assets
        run: npm run build:webview

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --no-dependencies --out rich-markdown-editor-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: rich-markdown-editor-vsix
          path: rich-markdown-editor-ci.vsix
          if-no-files-found: error
